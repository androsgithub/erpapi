spring:
  application:
    name: erp-test

  threads:
    virtual:
      enabled: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration/master
    out-of-order: 'false'
    validate-on-migrate: 'false'

  datasource:
    url: jdbc:h2:mem:testdb;MODE=MYSQL;DB_CLOSE_DELAY=-1;TRACE_LEVEL_SYSTEM_OUT=0
    driver-class-name: org.h2.Driver
    username: sa
    password:

    logs:
      driver-class-name: org.h2.Driver
      username: sa
      password:
      url: jdbc:h2:mem:testdb_logs;MODE=MYSQL;DB_CLOSE_DELAY=-1;TRACE_LEVEL_SYSTEM_OUT=0

    master:
      driver-class-name: org.h2.Driver
      username: sa
      password:
      url: jdbc:h2:mem:testdb_master;MODE=MYSQL;DB_CLOSE_DELAY=-1;TRACE_LEVEL_SYSTEM_OUT=0

  jpa:
    hibernate:
      ddl-auto: validate
      naming:
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyComponentPathImpl
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        format_sql: false
        use_sql_comments: true
    show-sql: false

management:
  endpoints:
    web:
      exposure:
        include: '*'


observability:
  database:
    username: sa
    driver-class-name: org.h2.Driver
    password:
    url: jdbc:h2:mem:testdb_observability;MODE=MYSQL;DB_CLOSE_DELAY=-1;TRACE_LEVEL_SYSTEM_OUT=0
    enabled: true
  kafka:
    enabled: false
  websocket:
    enabled: false

taxengine:
  enabled: true
  datasource:
    url: jdbc:h2:mem:testdb_tax;MODE=MYSQL;DB_CLOSE_DELAY=-1;TRACE_LEVEL_SYSTEM_OUT=0
    username: sa
    password:
    driver-class-name: org.h2.Driver