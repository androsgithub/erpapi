# ========================================
# Configuração de Decorators - Feature Contato
# ========================================
# Este arquivo demonstra como configurar quais decorators
# devem ser ativados no serviço de Contato.
#
# Copie estas propriedades para seu application.properties
# ou crie um arquivo application-decorators.properties
#
# ========================================

# ========================================
# Validation Decorator
# Valida dados de entrada e IDs
# ========================================
contato.decorators.validation.enabled=true
contato.decorators.validation.validate-id=true
contato.decorators.validation.validate-request=true

# ========================================
# Audit Decorator
# Registra operações em logs estruturados
# ========================================
contato.decorators.audit.enabled=true
contato.decorators.audit.log-sensitive-data=false
contato.decorators.audit.log-level=INFO

# ========================================
# Cache Decorator
# Cacheia resultados de leitura
# ========================================
contato.decorators.cache.enabled=false
contato.decorators.cache.ttl-minutes=10
contato.decorators.cache.max-size=500
contato.decorators.cache.type=caffeine

# ========================================
# Format Validation Decorator
# Valida formato de email, telefone, URL, etc.
# ========================================
contato.decorators.format-validation.enabled=false
contato.decorators.format-validation.validate-email=true
contato.decorators.format-validation.validate-phone=true
contato.decorators.format-validation.validate-url=true

# ========================================
# Notification Decorator (Exemplo Customizado)
# Envia notificações quando contatos são alterados
# ========================================
contato.decorators.notification.enabled=false
contato.decorators.notification.email-notification-on=CREATE,UPDATE,DELETE
contato.decorators.notification.recipient-email=admin@empresa.com

# ========================================
# Encryption Decorator (Exemplo Customizado)
# Criptografa valores sensíveis de contato
# ========================================
contato.decorators.encryption.enabled=false
contato.decorators.encryption.algorithm=AES
contato.decorators.encryption.key-store-path=/path/to/keystore

# ========================================
# Exemplo de Configurações Comuns
# ========================================

# Desenvolvimento: Validação + Audit (sem cache)
# contato.decorators.validation.enabled=true
# contato.decorators.audit.enabled=true
# contato.decorators.cache.enabled=false
# contato.decorators.format-validation.enabled=true

# Produção: Tudo ativado com cache
# contato.decorators.validation.enabled=true
# contato.decorators.audit.enabled=true
# contato.decorators.cache.enabled=true
# contato.decorators.cache.ttl-minutes=30
# contato.decorators.format-validation.enabled=true

# Mínimo: Apenas o serviço base (sem decorators)
# contato.decorators.validation.enabled=false
# contato.decorators.audit.enabled=false
# contato.decorators.cache.enabled=false
# contato.decorators.format-validation.enabled=false

# ========================================
# Configuração de Cache (se habilitado)
# ========================================
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterAccess=10m

# Ou usar Redis (descomente se preferir)
# spring.cache.type=redis
# spring.redis.host=localhost
# spring.redis.port=6379
# spring.redis.password=

# ========================================
# Logging
# ========================================
logging.level.com.api.erp.v1.features.contato.application.service.decorator=DEBUG
logging.level.com.api.erp.v1.features.contato.application.service.decorator.config=INFO
